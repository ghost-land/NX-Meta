<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Not Found</title>
  <style>
    html,body{height:100%}
    body{margin:0;display:grid;place-items:center;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:#f6f7f9;color:#0f172a}
    main{text-align:center;padding:2rem 1.5rem}
    h1{font-size:clamp(3rem,12vw,6rem);margin:0}
    p{margin:.5rem 0 1rem;color:#475569}
    a{display:inline-block;padding:.6rem .9rem;border-radius:.75rem;text-decoration:none;font-weight:600;border:1px solid #cbd5e1}
    a:hover{background:#fff}
    @media (prefers-color-scheme: dark){body{background:#0b0c10;color:#e5e7eb} p{color:#9ca3af} a{border-color:#374151} a:hover{background:#111318}}
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>Page not found.</p>
    <a href="/">Go home</a>
  </main>
</body>
</html>
