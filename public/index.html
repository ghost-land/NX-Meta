<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download index.tfl</title>
</head>
<body>
    <h1>Your download start...</h1>
    <p>If the download doesn't start automatically, <a href=“index.tfl” download>click here to download the file.</a></p>

    <script>
        // Forcer le téléchargement du fichier
        window.onload = function() {
            const link = document.createElement('a');
            link.href = 'index.tfl';
            link.download = 'index.tfl';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>
</body>
</html>
